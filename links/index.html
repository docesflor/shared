<style>
/* ═══════════════════════════════════════════
   LINKS — ESTILOS ESPECÍFICOS
   Reset, :root (cores) e fontes-base já vêm de shared/theme.css
═══════════════════════════════════════════ */

html, body {
    height: 100%;
    overflow: hidden;
}
body {
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    background: var(--brown-dark);
    color: var(--text-body);
    box-sizing: border-box;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,148,58,0.18) 0%, transparent 70%),
        repeating-linear-gradient(-45deg, transparent 0px, transparent 18px, rgba(255,255,255,0.02) 18px, rgba(255,255,255,0.02) 19px);
    pointer-events: none;
}

.box {
    position: relative;
    z-index: 1;
    background: var(--cream);
    border-radius: 24px;
    padding: 3vh 28px 2.2vh;
    width: 100%;
    max-width: 380px;
    max-height: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
    overflow-y: auto;
    box-sizing: border-box;
}

.logo-ring {
    width: clamp(80px, 16vh, 130px);
    height: clamp(80px, 16vh, 130px);
    border-radius: 50%;
    border: 3px solid var(--amber);
    padding: 5px;
    background: var(--brown-dark);
    box-shadow: 0 0 0 1px rgba(232,148,58,0.3), 0 12px 30px rgba(0,0,0,0.4);
    margin: 0 auto 1.5vh;
    animation: logoFlutua 4s ease-in-out infinite;
    position: relative;
}
@media (min-width: 700px) {
  .logo-ring {
    width: 170px;
    height: 170px;
  }
}

.logo-ring::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,148,58,0.35) 0%, transparent 70%);
    animation: glowPulso 2.5s ease-in-out infinite;
    z-index: -1;
}
@keyframes glowPulso {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.1); }
}
@keyframes logoFlutua {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
}
.box { transition: opacity 0.25s ease; }
.link-item.mais-clicado {
    position: relative;
    border-color: var(--amber);
}
.link-item.mais-clicado::after {
    content: '🔥 Mais popular';
    position: absolute;
    top: -9px; right: 12px;
    background: var(--amber);
    color: white;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
}
.logo-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

.tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--brown-warm);
    font-size: clamp(0.8rem, 2.2vh, 0.95rem);
    margin-bottom: 1.8vh;
}

.btn-compartilhar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0 auto 1.8vh;
    padding: 0.5vh 16px;
    border-radius: 50px;
    border: 1.5px solid var(--cream-dark);
    background: var(--white);
    color: var(--brown-warm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}
.btn-compartilhar:hover { border-color: var(--amber); background: var(--cream-dark); }

.links {
    display: flex;
    flex-direction: column;
    gap: 1.1vh;
}

.link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 1.2vh 16px;
    border-radius: 14px;
    background: var(--white);
    border: 2px solid var(--cream-dark);
    color: var(--brown-dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: clamp(0.78rem, 2vh, 0.86rem);
    text-decoration: none;
    text-align: left;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    box-sizing: border-box;
}
.link-item:hover { border-color: var(--amber); background: var(--cream-dark); transform: translateY(-2px); }
.link-item:active { transform: translateY(0); }
.link-item {
  opacity: 0;
  animation: linkEntrar 0.45s ease forwards;
}
.links .link-item:nth-child(1) { animation-delay: 0.05s; }
.links .link-item:nth-child(2) { animation-delay: 0.15s; }
.links .link-item:nth-child(3) { animation-delay: 0.25s; }
.links .link-item:nth-child(4) { animation-delay: 0.35s; }
.links .link-item:nth-child(5) { animation-delay: 0.45s; }
.links .link-item:nth-child(6) { animation-delay: 0.55s; }
@keyframes linkEntrar {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.link-icon {
    width: 30px; height: 30px;
    min-width: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    background: var(--white);
    border: 1px solid var(--cream-dark);
}
.link-icon.icon-whatsapp,
.link-icon.icon-instagram,
.link-icon.icon-facebook,
.link-icon.icon-drive { padding: 2px; }

.link-item.principal { background: var(--amber); border-color: var(--amber); color: var(--white); }
.link-item.principal .link-icon { background: rgba(255,255,255,0.2); border-color: transparent; }
.link-item.principal:hover { background: #C9522A; border-color: #C9522A; }

.rodape {
    margin-top: 1.8vh;
    font-size: 0.7rem;
    color: var(--brown-warm);
    opacity: 0.7;
    letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div class="box">
    <div class="logo-ring"><img src="https://docesflor.github.io/shared/icone.png" alt="Doces Flor"></div>
    <p class="tagline">Brigadeiros artesanais · Jaraguá do Sul</p>
    <button class="btn-compartilhar" id="btnCompartilhar" onclick="compartilharPagina()">
        <span id="iconeCompartilhar">🔗</span> <span id="textoCompartilhar">Compartilhar</span>

    <div class="links" id="links">

            <span class="link-icon icon-whatsapp"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#25D366" d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 18.15h-.01a8.2 8.2 0 0 1-4.19-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.22 8.22 0 0 1-1.27-4.38c0-4.54 3.7-8.24 8.25-8.24 2.2 0 4.27.86 5.83 2.42a8.18 8.18 0 0 1 2.41 5.83c0 4.55-3.7 8.23-8.23 8.23zm4.52-6.16c-.25-.12-1.47-.72-1.7-.81-.23-.08-.39-.12-.56.13-.17.25-.64.81-.78.97-.14.17-.29.19-.53.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.39-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.23.25-.86.84-.86 2.05 0 1.21.88 2.38 1 2.54.12.17 1.73 2.64 4.2 3.7.59.25 1.04.4 1.4.52.59.19 1.12.16 1.55.1.47-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.14-1.18-.06-.11-.23-.17-.48-.29z"/></svg></span> WhatsApp

<script>
// Registra cliques por link (opcional, ajuda a medir qual canal mais converte)
firebase.initializeApp(window.FIREBASE_CONFIG);
const database = firebase.database();

async function compartilharPagina() {
    const url = 'https://docesflor.github.io/links/';
    const texto = 'Doces Flor — Brigadeiros artesanais 🌸';
    if (navigator.share) {
        try {
            await navigator.share({ title: texto, url });
        } catch (e) { /* usuário cancelou o compartilhamento, ignora */ }
        return;
    }
    try {
        await navigator.clipboard.writeText(url);
        document.getElementById('iconeCompartilhar').textContent = '✓';
        document.getElementById('textoCompartilhar').textContent = 'Link copiado!';
        setTimeout(() => {
            document.getElementById('iconeCompartilhar').textContent = '🔗';
            document.getElementById('textoCompartilhar').textContent = 'Compartilhar';
        }, 2000);
    } catch (e) {
        window.prompt('Copie o link:', url);
    }
}

database.ref('estatisticas-links/_visualizacoes_pagina').transaction(atual => (atual || 0) + 1)
    .catch(err => console.warn('Erro ao contar visualização:', err));

document.querySelectorAll('.link-item').forEach(el => {
    el.addEventListener('click', function(e) {
        const nome = this.dataset.nome;
        database.ref('estatisticas-links/' + nome).transaction(atual => (atual || 0) + 1);

        // Transição suave antes de sair da página — só para links que abrem na MESMA aba
        // (os externos, com target="_blank", abrem em nova aba e não precisam de delay)
        if (this.target !== '_blank') {
            e.preventDefault();
            document.querySelector('.box').style.opacity = '0';
            setTimeout(() => { window.location.href = this.href; }, 250);
        }
    });
});

// Destaca automaticamente o link com mais cliques registrados até agora
database.ref('estatisticas-links').once('value').then(snap => {
    const dados = snap.val() || {};
    let maiorNome = null, maiorValor = 0;
    Object.entries(dados).forEach(([nome, valor]) => {
        if (valor > maiorValor) { maiorValor = valor; maiorNome = nome; }
    });
    if (maiorNome && maiorValor > 0) {
        const el = document.querySelector(`.link-item[data-nome="${maiorNome}"]`);
        if (el) el.classList.add('mais-clicado');
    }
});
</script>
